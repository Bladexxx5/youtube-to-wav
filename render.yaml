services:
  - type: web
    name: wavify-converter
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.1
    # Nota: Si usas la versión Native de Render, necesitarás instalar ffmpeg.
    # Es RECOMENDABLE usar el Dockerfile adjunto para asegurar FFmpeg instalado.
